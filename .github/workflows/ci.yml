name: CI

on:
  pull_request:
    branches: [dev, main]
  workflow_call:

concurrency:
  # PRs share a group (new pushes cancel stale runs); other invocations get a
  # unique group so deploy-triggered CI runs are never cancelled mid-deploy.
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      # Build-time placeholders — real values are baked in by the deploy
      # workflows from GitHub environment variables.
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci-placeholder
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build
