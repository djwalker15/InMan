name: E2E Smoke

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  e2e:
    # On workflow_run, only proceed if the staging deploy succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Fail fast: without this a stalled Playwright browser download hangs for
    # the full 6h default job timeout before GitHub cancels it.
    timeout-minutes: 20
    environment: staging
    defaults:
      run:
        working-directory: app
    env:
      CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # Cache the browser binaries so we don't re-download ~170MB every run.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      # The Playwright CDN download occasionally stalls mid-transfer; cap each
      # attempt with `timeout` and retry so a stall fails fast instead of
      # hanging until the job timeout.
      - name: Install Playwright browsers
        run: |
          for i in 1 2 3; do
            timeout 300 npx playwright install --with-deps chromium && exit 0
            echo "::warning::playwright install attempt $i stalled/failed; retrying"
            sleep 10
          done
          echo "::error::playwright install failed after 3 attempts"; exit 1
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 7
