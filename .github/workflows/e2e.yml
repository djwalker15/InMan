name: E2E Smoke

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  e2e:
    # On workflow_run, only proceed if the staging deploy succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Prebuilt image with the browsers + system deps baked in (pinned to the
    # @playwright/test version in app/package-lock.json). Avoids the flaky
    # runtime Chromium CDN download that previously stalled the job for hours.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    environment: staging
    defaults:
      run:
        working-directory: app
    env:
      CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - run: npm ci
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 7
