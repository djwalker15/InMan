name: Deploy Staging

on:
  push:
    branches: [dev]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - 'inman-design-system/**'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  supabase:
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinned: newer CLIs refuse `config push` against a branch ref that
          # matches a [remotes.*] block; 2.101.0 applies the override correctly.
          version: 2.101.0
      - name: Push config to staging branch
        run: supabase config push --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --yes
      - name: Apply migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --use-api

  app:
    needs: supabase
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: app
    env:
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          command: pages deploy dist --project-name=inman-app-staging --branch=main
