name: Deploy Staging

on:
  push:
    branches: [dev]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - 'inman-design-system/**'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  supabase:
    needs: ci
    runs-on: ubuntu-latest
    # Fail fast: a hung config-push/db-push/functions-deploy would otherwise
    # stall to GitHub's 6h job ceiling. Normal runs finish in ~3 min.
    timeout-minutes: 15
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinned: newer CLIs refuse `config push` against a branch ref that
          # matches a [remotes.*] block; 2.101.0 applies the override correctly.
          version: 2.101.0
      - name: Push config to staging branch
        run: supabase config push --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --yes
      # `config push` does NOT register third-party auth providers on a branch,
      # so the staging branch rejected every Clerk-signed JWT with 401 (the whole
      # app is unusable for signed-in users without this). Branch projects are
      # isolated and don't inherit the parent's Clerk integration, and a branch
      # reset would drop it again — so register it idempotently via the
      # Management API on every deploy. Issuer must match config.toml's
      # [auth.third_party.clerk].domain.
      - name: Ensure Clerk third-party auth on staging branch
        env:
          STAGING_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          CLERK_ISSUER: https://outgoing-wren-98.clerk.accounts.dev
        run: |
          set -euo pipefail
          api="https://api.supabase.com/v1/projects/${STAGING_REF}/config/auth/third-party-auth"
          existing=$(curl -sf -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" "$api")
          echo "Existing third-party auth integrations: ${existing}"
          if echo "${existing}" | grep -q "${CLERK_ISSUER}"; then
            echo "Clerk third-party auth already registered on staging — nothing to do."
            exit 0
          fi
          echo "Registering Clerk third-party auth on staging branch ${STAGING_REF}..."
          code=$(curl -s -o /tmp/tpa_resp.json -w '%{http_code}' -X POST "${api}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"oidc_issuer_url\":\"${CLERK_ISSUER}\"}")
          echo "HTTP ${code}"; cat /tmp/tpa_resp.json; echo
          case "${code}" in
            2*)  echo "Clerk third-party auth registered." ;;
            409) echo "Already registered (409) — ok." ;;
            *)   echo "::error::Failed to register Clerk third-party auth (HTTP ${code})"; exit 1 ;;
          esac
      - name: Apply migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --use-api

  app:
    needs: supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    defaults:
      run:
        working-directory: app
    env:
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          command: pages deploy dist --project-name=inman-app-staging --branch=main
