<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-direction:column;gap:18px;">
    <div style="display:inline-flex;padding:4px;border-radius:9999px;background:var(--paper-200);gap:2px;align-self:flex-start;">
      <button style="padding:8px 16px;border-radius:9999px;border:none;cursor:pointer;background:#fff;color:var(--ink-900);font-family:var(--font-display);font-weight:700;font-size:13px;box-shadow:0 1px 2px rgba(28,28,24,0.08);">Pantry</button>
      <button style="padding:8px 16px;border-radius:9999px;border:none;cursor:pointer;background:transparent;color:var(--ink-600);font-family:var(--font-display);font-weight:700;font-size:13px;">Bar</button>
      <button style="padding:8px 16px;border-radius:9999px;border:none;cursor:pointer;background:transparent;color:var(--ink-600);font-family:var(--font-display);font-weight:700;font-size:13px;">Fridge</button>
    </div>
    <div style="display:inline-flex;align-items:center;gap:12px;align-self:flex-start;">
      <button style="width:36px;height:36px;border-radius:9999px;border:none;cursor:pointer;background:var(--paper-200);color:var(--ink-900);display:flex;align-items:center;justify-content:center;"><svg width="14" height="2" viewBox="0 0 14 2"><rect width="14" height="2" rx="1" fill="currentColor"/></svg></button>
      <span style="min-width:32px;text-align:center;font-family:var(--font-numeric);font-weight:700;font-size:17px;color:var(--ink-900);font-feature-settings:'tnum' 1;">3</span>
      <button style="width:36px;height:36px;border-radius:9999px;border:none;cursor:pointer;background:var(--paper-200);color:var(--ink-900);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5 V19 M5 12 H19"/></svg></button>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Segmented (pill on paper) · Stepper (round +/-)</div>
</div></body></html>
