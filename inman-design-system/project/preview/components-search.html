<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;height:48px;border-radius:12px;background:var(--paper-100);">
      <span style="color:var(--ink-500);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"><circle cx="11" cy="11" r="6.5"/><path d="M16 16 L20 20" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <span style="flex:1;font-family:var(--font-body);font-size:15px;color:var(--ink-500);">Search items…</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;height:48px;border-radius:12px;background:var(--paper-250);border-bottom:2px solid var(--sage-700);">
      <span style="color:var(--sage-700);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"><circle cx="11" cy="11" r="6.5"/><path d="M16 16 L20 20" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <span style="flex:1;font-family:var(--font-body);font-size:15px;color:var(--ink-900);">olive oil</span>
      <span style="width:22px;height:22px;border-radius:9999px;background:var(--paper-300);color:var(--ink-700);display:flex;align-items:center;justify-content:center;cursor:pointer;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg></span>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Rest paper-100 · focus paper-250 + 2px sage bottom-bar</div>
</div></body></html>
