<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="position:relative;height:380px;background:url('../assets/hero-larder.png') center/cover;border-radius:16px;padding:0;overflow:hidden;">
  <div style="position:absolute;inset:0;background:rgba(28,28,24,0.35);"></div>
  <div style="position:absolute;left:0;right:0;bottom:0;background:var(--paper-50);border-top-left-radius:24px;border-top-right-radius:24px;padding:12px 24px 28px;box-shadow:0 -8px 32px rgba(28,28,24,0.12);">
    <div style="width:40px;height:4px;border-radius:9999px;background:var(--paper-300);margin:8px auto 16px;"></div>
    <div class="headline-md" style="margin-bottom:14px;">Add to inventory</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;">
        <div style="width:36px;height:36px;border-radius:9999px;background:rgba(74,130,101,0.10);color:var(--sage-700);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M4 8 a2 2 0 0 1 2 -2 H8.5 L10 4 H14 L15.5 6 H18 a2 2 0 0 1 2 2 V18 a2 2 0 0 1 -2 2 H6 a2 2 0 0 1 -2 -2 Z"/><circle cx="12" cy="13" r="3.5"/></svg></div>
        <div style="font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink-900);">Snap a photo</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;">
        <div style="width:36px;height:36px;border-radius:9999px;background:rgba(74,130,101,0.10);color:var(--sage-700);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 V5 a2 2 0 0 1 2 -2 H8 M16 3 H19 a2 2 0 0 1 2 2 V8 M21 16 V19 a2 2 0 0 1 -2 2 H16 M8 21 H5 a2 2 0 0 1 -2 -2 V16 M3 12 H21"/></svg></div>
        <div style="font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink-900);">Scan a barcode</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;">
        <div style="width:36px;height:36px;border-radius:9999px;background:rgba(74,130,101,0.10);color:var(--sage-700);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round"><path d="M4 20 H8 L19 9 L15 5 L4 16 Z"/></svg></div>
        <div style="font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink-900);">Type it in</div>
      </div>
    </div>
  </div>
</div></body></html>
