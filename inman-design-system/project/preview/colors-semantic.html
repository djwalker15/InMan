<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(3, 1fr);">
    <div class="swatch"><div class="swatch-block" style="background:#BA1A1A;color:#fff">Error</div><div class="swatch-meta"><b>--error</b><span>#BA1A1A</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#D97706;color:#fff">Warn</div><div class="swatch-meta"><b>--warn</b><span>#D97706</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#31694D;color:#fff">Success</div><div class="swatch-meta"><b>--success</b><span>sage-700</span></div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:12px;color:var(--ink-600);">
    Error for expiring items. Amber for pro-tip cards. Success borrows the primary sage.
  </div>
</div></body></html>
