<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:18px 14px;color:var(--sage-700);">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5 V19 M5 12 H19"/></svg><span>plus</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"><circle cx="11" cy="11" r="6.5" stroke-width="2.25"/><path d="M16 16 L20 20" stroke-width="2.5"/></svg><span>search</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5 H21 L14 13 V20 L10 18 V13 Z"/></svg><span>filter</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round"><path d="M7 4 V18 L4 15 M7 4 L10 7 M17 20 V6 L20 9 M17 20 L14 17"/></svg><span>sort</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 V5 a2 2 0 0 1 2 -2 H8 M16 3 H19 a2 2 0 0 1 2 2 V8 M21 16 V19 a2 2 0 0 1 -2 2 H16 M8 21 H5 a2 2 0 0 1 -2 -2 V16 M3 12 H21"/></svg><span>scan</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M4 8 a2 2 0 0 1 2 -2 H8.5 L10 4 H14 L15.5 6 H18 a2 2 0 0 1 2 2 V18 a2 2 0 0 1 -2 2 H6 a2 2 0 0 1 -2 -2 Z"/><circle cx="12" cy="13" r="3.5"/></svg><span>camera</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round"><path d="M4 20 H8 L19 9 L15 5 L4 16 Z M14 6 L18 10"/></svg><span>edit</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round"><path d="M5 7 H19 L18 20 a1 1 0 0 1 -1 1 H7 a1 1 0 0 1 -1 -1 Z M9 7 V4 a1 1 0 0 1 1 -1 H14 a1 1 0 0 1 1 1 V7 M3 7 H21 M10 11 V17 M14 11 V17"/></svg><span>delete</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M8.5 10.5 L15.5 7 M8.5 13.5 L15.5 17" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" fill="none"/></svg><span>share</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 L10 17 L19 7"/></svg><span>check</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15.5 14" stroke-width="2.5" stroke-linecap="round"/></svg><span>clock</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M12 3 L22 20 H2 Z"/><path d="M12 9 V14 M12 17 V17.01" stroke-width="2.5" stroke-linecap="round"/></svg><span>alert</span>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Action glyphs · 24px · solid where filled, 2.25 stroke where outlined</div>
</div></body></html>
