<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch"><div class="swatch-block" style="background:#1C1C18;color:#fff">900</div><div class="swatch-meta"><b>ink-900</b><span>#1C1C18</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#404943;color:#fff">700</div><div class="swatch-meta"><b>ink-700</b><span>#404943</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#605E58;color:#fff">600</div><div class="swatch-meta"><b>ink-600</b><span>#605E58</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#A8A29E;color:#fff">400</div><div class="swatch-meta"><b>ink-400</b><span>#A8A29E</span></div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:12px;color:var(--ink-600);">
    Ink — text + tinted shadows. <b>Never #000</b>; ink-900 (#1C1C18) is the floor.
  </div>
</div></body></html>
