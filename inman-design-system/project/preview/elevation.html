<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;align-items:flex-end;gap:14px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:48px;height:24px;background:#F2EEE6;border-radius:9999px;box-shadow:0 1px 2px rgba(28,28,24,0.05);"></div>
      <span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">sm</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:64px;height:48px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(28,28,24,0.05);"></div>
      <span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">md</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:96px;height:64px;background:#fff;border-radius:12px;box-shadow:0 8px 24px -4px rgba(28,28,24,0.06);"></div>
      <span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">lg (cards)</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:120px;height:64px;background:linear-gradient(135deg,#31694D,#4A8265);border-radius:12px;box-shadow:0 8px 16px -4px rgba(49,105,77,0.2);"></div>
      <span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">cta</span>
    </div>
  </div>
</div></body></html>
