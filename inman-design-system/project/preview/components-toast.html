<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-direction:column;gap:14px;align-items:flex-start;">
    <div style="display:inline-flex;align-items:center;gap:12px;background:#31694D;color:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 8px 32px rgba(28,28,24,0.18);font-family:var(--font-body);font-size:14px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 L10 17 L19 7"/></svg>
      <span>Saved to Walker Home</span>
      <button style="background:none;border:none;cursor:pointer;color:#B4F0CD;font-family:var(--font-display);font-weight:700;font-size:13px;margin-left:8px;">Undo</button>
    </div>
    <div style="display:inline-flex;align-items:center;gap:12px;background:#1C1C18;color:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 8px 32px rgba(28,28,24,0.18);font-family:var(--font-body);font-size:14px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M12 3 L22 20 H2 Z"/><path d="M12 9 V14 M12 17 V17.01" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span>Couldn't sync — we'll retry shortly</span>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Success (sage) · Error/Info (ink) · 12px radius · ambient shadow</div>
</div></body></html>
