<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;align-items:center;gap:24px;">
    <button style="width:48px;height:28px;padding:2px;border:none;background:#31694D;border-radius:9999px;position:relative;cursor:pointer;">
      <span style="position:absolute;top:2px;left:22px;width:24px;height:24px;background:#fff;border-radius:9999px;box-shadow:0 1px 3px rgba(28,28,24,0.18);"></span>
    </button>
    <button style="width:48px;height:28px;padding:2px;border:none;background:#E6E2DB;border-radius:9999px;position:relative;cursor:pointer;">
      <span style="position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:9999px;box-shadow:0 1px 3px rgba(28,28,24,0.18);"></span>
    </button>
    <div style="font-family:var(--font-body);font-size:13px;color:var(--ink-600);">on · off</div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Track sage-700 when on, paper-300 when off · 220ms ease-out, no bounce</div>
</div></body></html>
