<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch"><div class="swatch-block" style="background:#31694D;color:#fff">700</div><div class="swatch-meta"><b>sage-700</b><span>#31694D</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#4A8265;color:#fff">600</div><div class="swatch-meta"><b>sage-600</b><span>#4A8265</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#708067;color:#fff">500</div><div class="swatch-meta"><b>sage-500</b><span>#708067</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#C0C9C1;">300</div><div class="swatch-meta"><b>sage-300</b><span>#C0C9C1</span></div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:12px;color:var(--ink-600);">
    Sage — primary. CTAs use a 135° gradient from sage-700 → sage-600.
  </div>
</div></body></html>
