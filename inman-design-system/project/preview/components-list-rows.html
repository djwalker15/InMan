<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-direction:column;gap:10px;background:var(--paper-150);padding:12px;border-radius:12px;">
    <div style="display:flex;align-items:center;gap:14px;background:#FDFBF6;border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(28,28,24,0.04);">
      <div style="width:44px;height:44px;border-radius:9999px;background:rgba(74,130,101,0.10);color:var(--sage-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M10 2 H14 V6 a3 3 0 0 0 1 2.2 L16.5 10 a3 3 0 0 1 1 2.2 V20 a2 2 0 0 1 -2 2 H8.5 a2 2 0 0 1 -2 -2 V12.2 a3 3 0 0 1 1 -2.2 L9 8.2 A3 3 0 0 0 10 6 Z"/></svg>
      </div>
      <div style="flex:1;">
        <div style="font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink-900);">Olive Oil — Lucini</div>
        <div style="font-family:var(--font-body);font-size:13px;color:var(--ink-600);margin-top:2px;">Pantry Wall · 750ml · 2 left</div>
      </div>
      <div style="font-family:var(--font-body);font-size:13px;color:var(--ink-600);">14 Mar</div>
      <span style="color:var(--ink-400);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5 L16 12 L9 19"/></svg></span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;background:#FDFBF6;border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(28,28,24,0.04);">
      <div style="width:44px;height:44px;border-radius:9999px;background:rgba(186,26,26,0.10);color:var(--error);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15.5 14" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <div style="flex:1;">
        <div style="font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink-900);">Greek yogurt</div>
        <div style="font-family:var(--font-body);font-size:13px;color:var(--error);margin-top:2px;">Expires in 2 days</div>
      </div>
      <span style="color:var(--ink-400);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5 L16 12 L9 19"/></svg></span>
    </div>
  </div>
</div></body></html>
