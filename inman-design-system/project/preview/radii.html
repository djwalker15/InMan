<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:32px;height:32px;background:#EBE8E1;border-radius:6px;"></div><span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">6 sm</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:48px;height:48px;background:#EBE8E1;border-radius:8px;"></div><span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">8 md</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:64px;background:#EBE8E1;border-radius:12px;"></div><span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">12 lg</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:64px;background:#EBE8E1;border-radius:16px;"></div><span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">16 xl</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:64px;background:#EBE8E1;border-radius:9999px;"></div><span style="font-family:var(--font-body);font-size:11px;color:var(--ink-600);">full</span></div>
  </div>
</div></body></html>
