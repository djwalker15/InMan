<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:18px 14px;color:var(--sage-700);">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 11 L12 4 L21 11 V20 a1 1 0 0 1 -1 1 H15 V14 H9 V21 H4 a1 1 0 0 1 -1 -1 Z"/></svg><span>home</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M3 5 a2 2 0 0 1 2 -2 H19 a2 2 0 0 1 2 2 V19 a2 2 0 0 1 -2 2 H5 a2 2 0 0 1 -2 -2 Z M3 12 H21 M12 3 V21"/></svg><span>inventory</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round"><path d="M5 7 H19 L17.5 18 a1 1 0 0 1 -1 1 H7.5 a1 1 0 0 1 -1 -1 Z M8 7 V5 a4 4 0 0 1 8 0 V7"/></svg><span>shopping</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M12 3 L21 8 V16 L12 21 L3 16 V8 Z M12 3 V21 M3 8 L12 13 L21 8"/></svg><span>batches</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg><span>more</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 L8 12 L15 19"/></svg><span>back</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg><span>close</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--ink-600);font-family:var(--font-body);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6 H21 M3 12 H21 M3 18 H21"/></svg><span>menu</span>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Navigation glyphs · 24px · sage-700 active, ink-600 inactive</div>
</div></body></html>
