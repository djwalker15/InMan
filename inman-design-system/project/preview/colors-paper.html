<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(5, 1fr);">
    <div class="swatch"><div class="swatch-block" style="background:#FDF9F2;">50</div><div class="swatch-meta"><b>paper-50</b><span>#FDF9F2</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#F7F3EC;">100</div><div class="swatch-meta"><b>paper-100</b><span>#F7F3EC</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#F2EEE6;">150</div><div class="swatch-meta"><b>paper-150</b><span>#F2EEE6</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#F1EDE7;">200</div><div class="swatch-meta"><b>paper-200</b><span>#F1EDE7</span></div></div>
    <div class="swatch"><div class="swatch-block" style="background:#EBE8E1;">250</div><div class="swatch-meta"><b>paper-250</b><span>#EBE8E1</span></div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:12px;color:var(--ink-600);">
    Warm Stone — the paper stack. Stack tiers to imply depth (no borders).
  </div>
</div></body></html>
