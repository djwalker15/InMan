<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="position:relative;height:200px;background:#F2EEE6;border-radius:12px;overflow:hidden;">
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#FDF9F2 0%, #EBE8E1 100%);"></div>
    <div style="position:absolute;left:24px;top:24px;display:flex;flex-direction:column;gap:8px;">
      <div style="background:#fff;border-radius:8px;padding:10px 14px;box-shadow:0 1px 2px rgba(28,28,24,0.05);font-family:var(--font-body);font-size:13px;">Pantry Wall</div>
      <div style="background:#fff;border-radius:8px;padding:10px 14px;box-shadow:0 1px 2px rgba(28,28,24,0.05);font-family:var(--font-body);font-size:13px;">Upper Cabinet</div>
    </div>
    <div style="position:absolute;left:24px;bottom:24px;right:24px;background:rgba(253,249,242,0.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:9999px;padding:12px 24px;border:1px solid rgba(192,201,193,0.15);font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-900);text-align:center;">Glass nav · 80% paper-50 + blur(16px)</div>
  </div>
</div></body></html>
