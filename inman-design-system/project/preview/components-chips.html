<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:#EBE8E1;color:var(--ink-900);font-family:var(--font-body);font-weight:500;font-size:12px;">Pantry</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:rgba(74,130,101,0.12);color:var(--sage-700);font-family:var(--font-body);font-weight:500;font-size:12px;">Bar</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:#31694D;color:#fff;font-family:var(--font-body);font-weight:500;font-size:12px;">Selected ✓</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:rgba(217,119,6,0.12);color:#A05A05;font-family:var(--font-body);font-weight:500;font-size:12px;">Expiring soon</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:rgba(186,26,26,0.10);color:var(--error);font-family:var(--font-body);font-weight:500;font-size:12px;">Expired</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:#EBE8E1;color:var(--ink-900);font-family:var(--font-body);font-weight:500;font-size:12px;">Olive Oil <span style="opacity:0.5;font-size:10px;">✕</span></span>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:11px;color:var(--ink-600);">Default · sage · selected · warn · error · removable</div>
</div></body></html>
