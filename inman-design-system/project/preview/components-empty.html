<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="background:var(--paper-150);border-radius:16px;padding:32px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div style="width:72px;height:72px;border-radius:9999px;background:var(--paper-200);color:var(--sage-700);display:flex;align-items:center;justify-content:center;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M3 7 L12 3 L21 7 V17 L12 21 L3 17 Z M3 7 L12 11 L21 7 M12 11 V21"/></svg>
    </div>
    <div>
      <div class="headline-md" style="margin-bottom:6px;">Your pantry is empty</div>
      <div class="body-md" style="max-width:280px;margin:0 auto;">Snap, scan, or type your first item. We'll start tracking from there.</div>
    </div>
    <button style="background:linear-gradient(135deg,#31694D 0%,#4A8265 100%);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-family:var(--font-display);font-weight:700;font-size:15px;box-shadow:0 8px 16px -4px rgba(49,105,77,0.2);cursor:pointer;">Add an item</button>
  </div>
</div></body></html>
