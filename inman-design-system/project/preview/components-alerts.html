<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-direction:column;gap:12px;">
    <div style="background:rgba(74,130,101,0.10);border:1px solid var(--sage-600);border-radius:12px;padding:16px;display:flex;gap:14px;align-items:flex-start;">
      <div style="width:28px;height:28px;border-radius:9999px;background:var(--sage-600);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 L10 17 L19 7"/></svg></div>
      <div><div style="font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-900);margin-bottom:4px;">Saved to your pantry</div><div style="font-family:var(--font-body);font-size:14px;color:var(--ink-900);">Olive Oil added to Pantry Wall · Top Shelf.</div></div>
    </div>
    <div style="background:rgba(37,99,235,0.08);border:1px solid #2563EB;border-radius:12px;padding:16px;display:flex;gap:14px;align-items:flex-start;">
      <div style="width:28px;height:28px;border-radius:9999px;background:#2563EB;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"><circle cx="12" cy="12" r="9"/><path d="M12 11 V17 M12 7 V7.01" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <div><div style="font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-900);margin-bottom:4px;">Heads up</div><div style="font-family:var(--font-body);font-size:14px;color:var(--ink-900);">Three items expire this week. Review your batches.</div></div>
    </div>
    <div style="background:rgba(186,26,26,0.06);border:1px solid var(--error);border-radius:12px;padding:16px;display:flex;gap:14px;align-items:flex-start;">
      <div style="width:28px;height:28px;border-radius:9999px;background:var(--error);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linejoin="round"><path d="M12 3 L22 20 H2 Z"/><path d="M12 9 V14 M12 17 V17.01" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <div><div style="font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink-900);margin-bottom:4px;">Couldn't save</div><div style="font-family:var(--font-body);font-size:14px;color:var(--ink-900);">Check your connection and try again.</div></div>
    </div>
  </div>
</div></body></html>
