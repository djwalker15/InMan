<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="position:relative;height:300px;background:var(--paper-150);overflow:hidden;border-radius:16px;padding:0;">
  <div style="position:absolute;inset:0;background:rgba(28,28,24,0.4);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="width:100%;max-width:340px;background:var(--paper-50);border-radius:16px;box-shadow:0 24px 64px rgba(28,28,24,0.18);padding:24px;display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div class="headline-md" style="flex:1;">Delete this item?</div>
        <button style="width:32px;height:32px;border-radius:9999px;border:none;cursor:pointer;background:var(--paper-200);color:var(--ink-900);display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg></button>
      </div>
      <div class="body-md">Removing Olive Oil also removes it from any active batches. This can't be undone.</div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button style="flex:1;height:48px;border-radius:12px;border:none;cursor:pointer;background:var(--surface-container-highest);color:var(--sage-700);font-family:var(--font-display);font-weight:700;font-size:15px;">Cancel</button>
        <button style="flex:1;height:48px;border-radius:12px;border:none;cursor:pointer;background:var(--error);color:#fff;font-family:var(--font-display);font-weight:700;font-size:15px;">Delete</button>
      </div>
    </div>
  </div>
</div></body></html>
